<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>he服务器</title>
<style>
/* ===== 全局变量 ===== */
:root {
  --bg-dark: #0d0017;
  --bg-mid: #1a0a2e;
  --bg-light: #2d1b4e;
  --purple: #a855f7;
  --purple-bright: #c026d3;
  --pink: #e879f9;
  --cyan: #06b6d4;
  --neon: #d946ef;
  --text: #e0d0ff;
  --text-dim: #8b7aaa;
  --border: rgba(168,85,247,0.3);
  --card-bg: rgba(45,27,78,0.6);
  --danger: #ef4444;
  --success: #10b981;
  --warning: #f59e0b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景网格 */
body::before {
  content: '';
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background-image: 
    linear-gradient(rgba(168,85,247,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ===== 欢迎页 ===== */
#welcomePage {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: radial-gradient(ellipse at center, var(--bg-light) 0%, var(--bg-dark) 70%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  overflow: hidden;
}

/* 朋克扫描线 */
#welcomePage::after {
  content: '';
  position: absolute;
  top:0; left:0; right:0; bottom:0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 3px,
    rgba(168,85,247,0.04) 3px,
    rgba(168,85,247,0.04) 4px
  );
  pointer-events: none;
}

.welcome-logo {
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 8px;
  background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 50%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 40px rgba(217,70,239,0.5);
  margin-bottom: 10px;
  animation: glowPulse 3s ease-in-out infinite;
  position: relative;
  z-index: 2;
}

.welcome-subtitle {
  font-size: 18px;
  color: var(--text-dim);
  margin-bottom: 60px;
  letter-spacing: 2px;
  position: relative;
  z-index: 2;
}

.welcome-text {
  font-size: 24px;
  color: var(--text);
  margin-bottom: 50px;
  text-align: center;
  position: relative;
  z-index: 2;
  text-shadow: 0 0 20px rgba(168,85,247,0.3);
}

/* 圆形按钮 */
.enter-btn {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: transparent;
  border: 2px solid var(--purple);
  color: var(--text);
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.4s ease;
  box-shadow: 0 0 30px rgba(168,85,247,0.3),
              inset 0 0 30px rgba(168,85,247,0.1);
}

.enter-btn::before {
  content: '';
  position: absolute;
  top:-10px; left:-10px; right:-10px; bottom:-10px;
  border-radius: 50%;
  border: 1px solid transparent;
  background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: rotate 4s linear infinite;
  opacity: 0.6;
}

.enter-btn::after {
  content: '';
  position: absolute;
  top:-20px; left:-20px; right:-20px; bottom:-20px;
  border-radius: 50%;
  border: 1px dashed rgba(168,85,247,0.2);
  animation: rotate 10s linear infinite reverse;
}

.enter-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 60px rgba(217,70,239,0.6),
              inset 0 0 40px rgba(217,70,239,0.15);
  color: #fff;
}

.enter-btn span {
  position: relative;
  z-index: 3;
}

/* 浮动粒子 */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--neon);
  opacity: 0.6;
  pointer-events: none;
}

@keyframes glowPulse {
  0%,100% { filter: brightness(1) drop-shadow(0 0 20px rgba(168,85,247,0.5)); }
  50% { filter: brightness(1.3) drop-shadow(0 0 40px rgba(217,70,239,0.8)); }
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

/* ===== 弹窗通用 ===== */
.modal-overlay {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(13,0,23,0.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.modal-box {
  background: linear-gradient(145deg, var(--bg-light) 0%, var(--bg-mid) 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  min-width: 450px;
  max-width: 90vw;
  box-shadow: 0 0 50px rgba(168,85,247,0.2),
              0 20px 60px rgba(0,0,0,0.5);
  position: relative;
}

.modal-box::before {
  content: '';
  position: absolute;
  top:-1px; left:-1px; right:-1px; bottom:-1px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--purple), transparent, var(--neon));
  z-index: -1;
  opacity: 0.3;
}

.modal-title {
  font-size: 22px;
  font-weight: bold;
  color: var(--pink);
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.modal-desc {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(13,0,23,0.6);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
  margin-bottom: 16px;
}

.modal-input:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(168,85,247,0.15);
}

.modal-input::placeholder { color: var(--text-dim); }

.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--purple), var(--neon));
  color: #fff;
  box-shadow: 0 4px 20px rgba(168,85,247,0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(217,70,239,0.5);
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.btn-secondary:hover {
  border-color: var(--purple);
  color: var(--text);
}

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 10px;
}

/* 选择组 */
.select-group {
  display: grid;
  gap: 10px;
  margin-bottom: 16px;
}

.select-item {
  padding: 14px 16px;
  background: rgba(13,0,23,0.5);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
}

.select-item:hover {
  border-color: var(--purple);
  background: rgba(168,85,247,0.1);
}

.select-item.active {
  border-color: var(--neon);
  background: rgba(217,70,239,0.15);
  box-shadow: 0 0 15px rgba(168,85,247,0.2);
}

.select-item .check {
  margin-left: auto;
  color: var(--neon);
  display: none;
}

.select-item.active .check { display: block; }

.select-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

/* 支付方式 */
.pay-options {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
}

.pay-option {
  flex: 1;
  padding: 20px;
  border: 1px solid var(--border);
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(13,0,23,0.5);
}

.pay-option:hover { border-color: var(--purple); }
.pay-option.active {
  border-color: var(--neon);
  background: rgba(217,70,239,0.12);
}

.pay-option .icon { font-size: 36px; margin-bottom: 8px; }
.pay-option .name { font-size: 14px; color: var(--text); }

/* ===== 加载同步页 ===== */
#syncPage {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: var(--bg-dark);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 3000;
}

.sync-ring {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid transparent;
  border-top-color: var(--purple);
  border-right-color: var(--neon);
  animation: rotate 1s linear infinite;
  margin-bottom: 30px;
}

.sync-text {
  font-size: 20px;
  color: var(--text);
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(168,85,247,0.4);
}

.sync-progress {
  margin-top: 20px;
  width: 300px;
  height: 4px;
  background: rgba(168,85,247,0.15);
  border-radius: 2px;
  overflow: hidden;
}

.sync-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--neon));
  width: 0;
  transition: width 0.3s ease;
  border-radius: 2px;
}

.sync-success-icon {
  font-size: 60px;
  color: var(--success);
  margin-bottom: 20px;
  display: none;
  animation: bounceIn 0.5s ease;
}

@keyframes bounceIn {
  0% { transform: scale(0); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* ===== 主界面 ===== */
#mainApp {
  display: none;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* 顶部栏 */
.top-bar {
  height: 60px;
  background: rgba(26,10,46,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 30px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.top-bar .logo {
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}

.top-bar .site-tag {
  margin-left: 20px;
  padding: 4px 12px;
  background: rgba(168,85,247,0.15);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-dim);
}

.top-bar .balance {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
}

.top-bar .balance-amount {
  color: var(--warning);
  font-weight: bold;
}

/* 主体布局 */
.main-layout {
  display: flex;
  min-height: calc(100vh - 60px);
}

/* 左侧导航 */
.sidebar {
  width: 220px;
  background: rgba(26,10,46,0.6);
  backdrop-filter: blur(10px);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
}

.nav-item {
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 15px;
  color: var(--text-dim);
  border-left: 3px solid transparent;
}

.nav-item:hover {
  background: rgba(168,85,247,0.08);
  color: var(--text);
}

.nav-item.active {
  background: rgba(217,70,239,0.12);
  color: var(--pink);
  border-left-color: var(--neon);
}

.nav-item .nav-icon { font-size: 20px; }

/* 右侧内容 */
.content-area {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

.page-title {
  font-size: 24px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ===== 服务器页 ===== */
.server-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.add-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--purple), var(--neon));
  border: none;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(168,85,247,0.3);
}

.add-btn:hover {
  transform: scale(1.1) rotate(90deg);
  box-shadow: 0 6px 25px rgba(217,70,239,0.5);
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.empty-state .empty-icon {
  font-size: 64px;
  margin-bottom: 20px;
  opacity: 0.3;
}

.empty-state .empty-text {
  font-size: 16px;
  margin-bottom: 8px;
}

.empty-state .empty-hint {
  font-size: 13px;
  color: var(--text-dim);
  opacity: 0.6;
}

/* 服务器卡片 */
.server-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.server-card::before {
  content: '';
  position: absolute;
  top:0; left:0; width:3px; height:100%;
  background: linear-gradient(to bottom, var(--purple), var(--neon));
}

.server-card:hover {
  border-color: var(--purple);
  box-shadow: 0 8px 30px rgba(168,85,247,0.15);
  transform: translateY(-2px);
}

.server-card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.server-card .server-name {
  font-size: 18px;
  font-weight: bold;
  color: var(--text);
}

.server-card .server-status {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  background: rgba(16,185,129,0.15);
  color: var(--success);
  border: 1px solid rgba(16,185,129,0.3);
}

.server-card .server-status::before {
  content: '●';
  margin-right: 4px;
  animation: blink 2s infinite;
}

@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.server-info-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.info-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.info-item .label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.info-item .value {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
}

/* ===== 域名页 ===== */
.domain-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.3s;
}

.domain-card:hover {
  border-color: var(--purple);
  box-shadow: 0 4px 20px rgba(168,85,247,0.1);
}

.domain-card .domain-type {
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: bold;
}

.domain-type.bound {
  background: rgba(168,85,247,0.2);
  color: var(--purple);
  border: 1px solid var(--purple);
}

.domain-type.custom {
  background: rgba(6,182,212,0.15);
  color: var(--cyan);
  border: 1px solid var(--cyan);
}

.domain-card .domain-url {
  font-size: 16px;
  color: var(--text);
  flex: 1;
  font-family: monospace;
}

.domain-card .domain-status {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  background: rgba(16,185,129,0.15);
  color: var(--success);
}

/* ===== 钱包页 ===== */
.wallet-card {
  background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-mid) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.wallet-card::before {
  content: '';
  position: absolute;
  top:-50%; right:-20%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, transparent 70%);
  border-radius: 50%;
}

.wallet-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.wallet-amount {
  font-size: 42px;
  font-weight: 900;
  color: var(--warning);
  text-shadow: 0 0 20px rgba(245,158,11,0.3);
}

.wallet-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

/* 交易记录 */
.tx-list {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.tx-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 16px;
  font-weight: bold;
  color: var(--text);
}

.tx-item {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid rgba(168,85,247,0.08);
  font-size: 14px;
}

.tx-item:last-child { border-bottom: none; }

.tx-item .tx-type {
  width: 40px; height: 40px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

.tx-item .tx-info { flex: 1; }
.tx-item .tx-title { font-weight: 500; color: var(--text); }
.tx-item .tx-time { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.tx-item .tx-amount { font-weight: bold; }
.tx-amount.income { color: var(--success); }
.tx-amount.expense { color: var(--danger); }

/* ===== 数据库页 ===== */
.db-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.db-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.db-card:hover {
  border-color: var(--purple);
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(168,85,247,0.15);
}

.db-card.selected {
  border-color: var(--neon);
  box-shadow: 0 0 20px rgba(217,70,239,0.3);
}

.db-card .db-logo {
  width: 64px; height: 64px;
  border-radius: 12px;
  margin: 0 auto 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 900;
  color: #fff;
}

.db-card .db-name {
  font-size: 16px;
  font-weight: bold;
  color: var(--text);
  margin-bottom: 4px;
}

.db-card .db-desc {
  font-size: 12px;
  color: var(--text-dim);
}

.db-card .db-check {
  position: absolute;
  top: 10px; right: 10px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--neon);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
}

.db-card.selected .db-check { display: flex; }

/* 终端 */
.terminal-container {
  background: #0a0012;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: none;
}

.terminal-header {
  padding: 10px 16px;
  background: rgba(168,85,247,0.1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.terminal-header .dot {
  width: 12px; height: 12px;
  border-radius: 50%;
}

.terminal-header .dot.red { background: #ff5f57; }
.terminal-header .dot.yellow { background: #febc2e; }
.terminal-header .dot.green { background: #28c840; }

.terminal-header .term-title {
  margin-left: 12px;
  font-size: 13px;
  color: var(--text-dim);
}

.terminal-body {
  padding: 16px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 14px;
  color: #00ff88;
  height: 350px;
  overflow-y: auto;
  line-height: 1.6;
}

.terminal-line { margin-bottom: 4px; }
.terminal-prompt { color: var(--pink); }
.terminal-cursor {
  display: inline-block;
  width: 8px; height: 16px;
  background: #00ff88;
  animation: blink 1s infinite;
  vertical-align: text-bottom;
}

/* 动画进度 */
.processing-overlay {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(13,0,23,0.9);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 4000;
}

.processing-icon {
  font-size: 56px;
  margin-bottom: 24px;
  animation: rotate 2s linear infinite;
}

.processing-text {
  font-size: 20px;
  color: var(--text);
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.processing-bar {
  width: 300px;
  height: 6px;
  background: rgba(168,85,247,0.15);
  border-radius: 3px;
  overflow: hidden;
}

.processing-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--neon));
  width: 0;
  transition: width 0.3s ease;
  border-radius: 3px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 32px;
  background: rgba(45,27,78,0.95);
  border: 1px solid var(--purple);
  border-radius: 30px;
  color: var(--text);
  font-size: 14px;
  z-index: 5000;
  box-shadow: 0 8px 30px rgba(168,85,247,0.3);
  display: none;
  animation: toastIn 0.3s ease;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(168,85,247,0.5); }

/* 配置选项行 */
.config-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.config-row .select-item {
  flex: 1;
  justify-content: center;
  text-align: center;
  flex-direction: column;
  gap: 4px;
}

.config-row .select-item .ci-title {
  font-size: 14px;
  color: var(--text);
}

.config-row .select-item .ci-price {
  font-size: 12px;
  color: var(--warning);
}

.db-connected-server {
  background: rgba(168,85,247,0.08);
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.db-connected-server .conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--success);
  animation: blink 2s infinite;
}

.section-divider {
  font-size: 13px;
  color: var(--text-dim);
  margin: 20px 0 10px;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}
</style>
</head>
<body>

<!-- ===== 欢迎页 ===== -->
<div id="welcomePage">
  <div class="welcome-logo">he服务器</div>
  <div class="welcome-subtitle">// PUNK CLOUD PLATFORM v2.0</div>
  <div class="welcome-text">欢迎来到一起服务器</div>
  <button class="enter-btn" onclick="enterWorkbench()">
    <span>进入工作台</span>
  </button>
</div>

<!-- ===== 添加站点弹窗 ===== -->
<div class="modal-overlay" id="siteModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">添加您的站点</div>
    <div class="modal-desc">请输入您的站点网络地址（域名），此站点只能添加一次，请确认后提交。</div>
    <input type="text" class="modal-input" id="siteInput" placeholder="例如：www.example.com">
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="submitSite()">确认绑定</button>
    </div>
  </div>
</div>

<!-- ===== 同步加载页 ===== -->
<div id="syncPage" style="display:none;">
  <div class="sync-ring" id="syncRing"></div>
  <div class="sync-success-icon" id="syncSuccess">✓</div>
  <div class="sync-text" id="syncText">正在同步...</div>
  <div class="sync-progress"><div class="sync-progress-bar" id="syncBar"></div></div>
</div>

<!-- ===== 主界面 ===== -->
<div id="mainApp">
  <!-- 顶部栏 -->
  <div class="top-bar">
    <div class="logo">he服务器</div>
    <div class="site-tag" id="topSiteTag"></div>
    <div class="balance">
      <span style="color:var(--text-dim);">余额:</span>
      <span class="balance-amount" id="topBalance">¥0.00</span>
    </div>
  </div>

  <div class="main-layout">
    <!-- 左侧导航 -->
    <div class="sidebar">
      <div class="nav-item active" data-page="servers" onclick="switchPage('servers')">
        <span class="nav-icon">🖥️</span><span>我的服务器</span>
      </div>
      <div class="nav-item" data-page="domains" onclick="switchPage('domains')">
        <span class="nav-icon">🌐</span><span>我的域名</span>
      </div>
      <div class="nav-item" data-page="wallet" onclick="switchPage('wallet')">
        <span class="nav-icon">💰</span><span>我的资金</span>
      </div>
      <div class="nav-item" data-page="database" onclick="switchPage('database')">
        <span class="nav-icon">🗄️</span><span>数据库管理</span>
      </div>
    </div>

    <!-- 右侧内容 -->
    <div class="content-area" id="contentArea"></div>
  </div>
</div>

<!-- ===== 服务器添加弹窗 ===== -->
<div class="modal-overlay" id="serverModal" style="display:none;">
  <div class="modal-box" style="min-width:520px;">
    <div class="modal-title" id="serverModalTitle">添加服务器</div>
    <div id="serverModalContent"></div>
  </div>
</div>

<!-- ===== 充值弹窗 ===== -->
<div class="modal-overlay" id="rechargeModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">账户充值</div>
    <div id="rechargeContent"></div>
  </div>
</div>

<!-- ===== 数据库弹窗 ===== -->
<div class="modal-overlay" id="dbModal" style="display:none;">
  <div class="modal-box" style="min-width:520px;">
    <div class="modal-title" id="dbModalTitle">购买数据库</div>
    <div id="dbModalContent"></div>
  </div>
</div>

<!-- ===== 处理动画 ===== -->
<div class="processing-overlay" id="processingOverlay" style="display:none;">
  <div class="processing-icon" id="procIcon">⚙️</div>
  <div class="processing-text" id="procText">正在处理...</div>
  <div class="processing-bar"><div class="processing-bar-fill" id="procBar"></div></div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
/* ===== 数据存储 ===== */
const Store = {
  get(key, def) {
    try { const v = localStorage.getItem('heServer_'+key); return v ? JSON.parse(v) : def; }
    catch(e) { return def; }
  },
  set(key, val) { localStorage.setItem('heServer_'+key, JSON.stringify(val)); }
};

/* ===== 全局状态 ===== */
let state = {
  site: Store.get('site', null),
  servers: Store.get('servers', []),
  domains: Store.get('domains', []),
  balance: Store.get('balance', 0),
  transactions: Store.get('transactions', []),
  databases: Store.get('databases', []),
  domainBoundShown: Store.get('domainBoundShown', false)
};

function saveAll() {
  Store.set('site', state.site);
  Store.set('servers', state.servers);
  Store.set('domains', state.domains);
  Store.set('balance', state.balance);
  Store.set('transactions', state.transactions);
  Store.set('databases', state.databases);
  Store.set('domainBoundShown', state.domainBoundShown);
}

/* ===== Toast ===== */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

/* ===== 粒子背景 ===== */
function createParticles() {
  const wp = document.getElementById('welcomePage');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    const size = 2 + Math.random() * 4;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.animation = `floatParticle ${5 + Math.random() * 10}s ease-in-out infinite`;
    p.style.animationDelay = Math.random() * 5 + 's';
    p.style.opacity = 0.2 + Math.random() * 0.4;
    const colors = ['#a855f7', '#d946ef', '#06b6d4', '#e879f9'];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    wp.appendChild(p);
  }
  // 添加粒子动画
  const style = document.createElement('style');
  style.textContent = `
    @keyframes floatParticle {
      0%,100% { transform: translate(0,0); }
      33% { transform: translate(30px,-30px); }
      66% { transform: translate(-20px,20px); }
    }
  `;
  document.head.appendChild(style);
}
createParticles();

/* ===== 进入工作台 ===== */
function enterWorkbench() {
  if (state.site) {
    // 已有站点，直接进主界面
    showMainApp();
  } else {
    // 显示添加站点弹窗
    document.getElementById('siteModal').style.display = 'flex';
    setTimeout(() => document.getElementById('siteInput').focus(), 100);
  }
}

/* ===== 提交站点 ===== */
function submitSite() {
  const val = document.getElementById('siteInput').value.trim();
  if (!val) { showToast('请输入站点地址', 'error'); return; }
  
  state.site = val;
  saveAll();
  document.getElementById('siteModal').style.display = 'none';
  
  // 显示同步页面
  document.getElementById('welcomePage').style.display = 'none';
  document.getElementById('syncPage').style.display = 'flex';
  
  // 同步动画
  let progress = 0;
  const bar = document.getElementById('syncBar');
  const text = document.getElementById('syncText');
  
  const interval = setInterval(() => {
    progress += 3 + Math.random() * 5;
    if (progress >= 100) {
      progress = 100;
      bar.style.width = '100%';
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById('syncRing').style.display = 'none';
        document.getElementById('syncSuccess').style.display = 'block';
        text.textContent = '同步成功';
        text.style.color = 'var(--success)';
        setTimeout(() => {
          document.getElementById('syncPage').style.display = 'none';
          showMainApp();
        }, 1200);
      }, 400);
    } else {
      bar.style.width = progress + '%';
      if (progress < 30) text.textContent = '正在同步...';
      else if (progress < 60) text.textContent = '正在同步站点配置...';
      else if (progress < 90) text.textContent = '正在同步安全策略...';
      else text.textContent = '即将完成...';
    }
  }, 150);
}

/* ===== 显示主界面 ===== */
function showMainApp() {
  document.getElementById('welcomePage').style.display = 'none';
  document.getElementById('syncPage').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  
  document.getElementById('topSiteTag').textContent = '🔗 ' + (state.site || '未绑定');
  document.getElementById('topBalance').textContent = '¥' + state.balance.toFixed(2);
  
  // 如果绑定了站点且还没展示过，将其作为域名展示一次
  if (state.site && !state.domainBoundShown) {
    state.domains.unshift({ url: state.site, type: 'bound', status: '已解析' });
    state.domainBoundShown = true;
    saveAll();
  }
  
  switchPage('servers');
}

/* ===== 页面切换 ===== */
function switchPage(page) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const area = document.getElementById('contentArea');
  
  switch(page) {
    case 'servers': renderServers(); break;
    case 'domains': renderDomains(); break;
    case 'wallet': renderWallet(); break;
    case 'database': renderDatabase(); break;
  }
}

/* ===== 我的服务器 ===== */
function renderServers() {
  const area = document.getElementById('contentArea');
  
  if (state.servers.length === 0) {
    area.innerHTML = `
      <div class="page-title">我的服务器</div>
      <div class="server-header">
        <span></span>
        <button class="add-btn" onclick="openServerModal()" title="添加服务器">+</button>
      </div>
      <div class="empty-state">
        <div class="empty-icon">🖥️</div>
        <div class="empty-text">没有服务器</div>
        <div class="empty-hint">请点击右上角加号添加服务器</div>
      </div>
    `;
  } else {
    let cards = state.servers.map((s, i) => `
      <div class="server-card">
        <div class="card-header">
          <div class="server-name">${escapeHtml(s.name)}</div>
          <div class="server-status">运行中</div>
        </div>
        <div class="server-info-grid">
          <div class="info-item">
            <span class="label">地区</span>
            <span class="value">${escapeHtml(s.region)}</span>
          </div>
          <div class="info-item">
            <span class="label">内存</span>
            <span class="value">${escapeHtml(s.memory)}</span>
          </div>
          <div class="info-item">
            <span class="label">端口</span>
            <span class="value">${escapeHtml(s.port)}</span>
          </div>
          <div class="info-item">
            <span class="label">配置</span>
            <span class="value">${escapeHtml(s.config || '标准')}</span>
          </div>
        </div>
      </div>
    `).join('');
    
    area.innerHTML = `
      <div class="page-title">我的服务器</div>
      <div class="server-header">
        <span style="color:var(--text-dim);font-size:14px;">共 ${state.servers.length} 台服务器</span>
        <button class="add-btn" onclick="openServerModal()" title="添加服务器">+</button>
      </div>
      ${cards}
    `;
  }
}

/* ===== 服务器添加流程 ===== */
let serverForm = { config: null, region: null, memory: null, payMethod: null, payAccount: '', port: '', name: '' };

function openServerModal() {
  serverForm = { config: null, region: null, memory: null, payMethod: null, payAccount: '', port: '', name: '' };
  renderServerStep1();
  document.getElementById('serverModal').style.display = 'flex';
}

function renderServerStep1() {
  document.getElementById('serverModalTitle').textContent = '添加服务器 - 选择配置';
  const configs = [
    { id: 'basic', name: '基础版', desc: '1核 1G', price: '¥29/月' },
    { id: 'standard', name: '标准版', desc: '2核 2G', price: '¥59/月' },
    { id: 'pro', name: '专业版', desc: '4核 4G', price: '¥119/月' },
    { id: 'enterprise', name: '企业版', desc: '8核 8G', price: '¥299/月' }
  ];
  
  document.getElementById('serverModalContent').innerHTML = `
    <div class="select-label">选择服务器配置</div>
    <div class="select-group" id="configList">
      ${configs.map(c => `
        <div class="select-item" onclick="selectConfig('${c.id}','${c.name}','${c.price}')">
          <div>
            <div style="font-weight:bold;color:var(--text);">${c.name}</div>
            <div style="font-size:12px;color:var(--text-dim);">${c.desc} · ${c.price}</div>
          </div>
          <span class="check">✓</span>
        </div>
      `).join('')}
    </div>
    <div class="select-label">选择地区</div>
    <div class="config-row" id="regionList">
      ${['北京','上海','广州','成都'].map(r => `
        <div class="select-item" onclick="selectRegion('${r}')" style="flex-direction:column;">
          <span class="ci-title">${r}</span>
        </div>
      `).join('')}
    </div>
    <div class="select-label">选择内存</div>
    <div class="config-row" id="memoryList">
      ${['1GB','2GB','4GB','8GB'].map(m => `
        <div class="select-item" onclick="selectMemory('${m}')" style="flex-direction:column;">
          <span class="ci-title">${m}</span>
        </div>
      `).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="serverStep2()" id="step1Next" disabled style="opacity:0.5;">立即购买</button>
    </div>
  `;
}

function selectConfig(id, name, price) {
  serverForm.config = name;
  document.querySelectorAll('#configList .select-item').forEach((el, i) => {
    el.classList.toggle('active', ['basic','standard','pro','enterprise'][i] === id);
  });
  checkStep1();
}
function selectRegion(r) {
  serverForm.region = r;
  document.querySelectorAll('#regionList .select-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.ci-title').textContent === r);
  });
  checkStep1();
}
function selectMemory(m) {
  serverForm.memory = m;
  document.querySelectorAll('#memoryList .select-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.ci-title').textContent === m);
  });
  checkStep1();
}
function checkStep1() {
  const ok = serverForm.config && serverForm.region && serverForm.memory;
  const btn = document.getElementById('step1Next');
  if (btn) { btn.disabled = !ok; btn.style.opacity = ok ? '1' : '0.5'; }
}

function serverStep2() {
  document.getElementById('serverModalTitle').textContent = '添加服务器 - 选择支付方式';
  document.getElementById('serverModalContent').innerHTML = `
    <div class="modal-desc">请选择支付方式</div>
    <div class="pay-options">
      <div class="pay-option" onclick="selectPay('wechat', this)">
        <div class="icon">💬</div>
        <div class="name">微信支付</div>
      </div>
      <div class="pay-option" onclick="selectPay('alipay', this)">
        <div class="icon">💰</div>
        <div class="name">支付宝</div>
      </div>
    </div>
    <div id="payAccountArea" style="display:none;">
      <div class="select-label" id="payAccountLabel">请填入支付账号</div>
      <input type="text" class="modal-input" id="payAccountInput" placeholder="输入您的支付账号">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="renderServerStep1()">上一步</button>
      <button class="btn btn-primary" onclick="serverStep3()" id="step2Next" disabled style="opacity:0.5;">下一步</button>
    </div>
  `;
}

let selectedPayEl = null;
function selectPay(method, el) {
  serverForm.payMethod = method;
  document.querySelectorAll('.pay-option').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('payAccountArea').style.display = 'block';
  const payName = method === 'wechat' ? '微信' : '支付宝';
  document.getElementById('payAccountLabel').textContent = '请填入' + payName + '账号';
  document.getElementById('payAccountInput').placeholder = '输入您的' + payName + '账号';
  setTimeout(() => document.getElementById('payAccountInput').focus(), 100);
  document.getElementById('payAccountInput').oninput = function() {
    serverForm.payAccount = this.value.trim();
    const btn = document.getElementById('step2Next');
    btn.disabled = !serverForm.payAccount;
    btn.style.opacity = serverForm.payAccount ? '1' : '0.5';
  };
}

function serverStep3() {
  document.getElementById('serverModalTitle').textContent = '添加服务器 - 服务器信息';
  document.getElementById('serverModalContent').innerHTML = `
    <div class="select-label">请输入服务器名称</div>
    <input type="text" class="modal-input" id="serverNameInput" placeholder="例如：我的服务器-01">
    <div class="select-label">请填入端口号</div>
    <input type="text" class="modal-input" id="serverPortInput" placeholder="例如：8080" value="8080">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="serverStep2()">上一步</button>
      <button class="btn btn-primary" onclick="confirmAddServer()" id="step3Confirm" disabled style="opacity:0.5;">确定</button>
    </div>
    <script>
      const nI = document.getElementById('serverNameInput');
      const pI = document.getElementById('serverPortInput');
      function checkS3() {
        const ok = nI.value.trim() && pI.value.trim();
        const btn = document.getElementById('step3Confirm');
        btn.disabled = !ok;
        btn.style.opacity = ok ? '1' : '0.5';
      }
      nI.oninput = checkS3;
      pI.oninput = checkS3;
    <\/script>
  `;
  // 手动绑定
  const nI = document.getElementById('serverNameInput');
  const pI = document.getElementById('serverPortInput');
  function checkS3() {
    serverForm.name = nI.value.trim();
    serverForm.port = pI.value.trim();
    const ok = serverForm.name && serverForm.port;
    const btn = document.getElementById('step3Confirm');
    btn.disabled = !ok;
    btn.style.opacity = ok ? '1' : '0.5';
  }
  nI.oninput = checkS3;
  pI.oninput = checkS3;
}

function confirmAddServer() {
  serverForm.name = document.getElementById('serverNameInput').value.trim();
  serverForm.port = document.getElementById('serverPortInput').value.trim();
  
  if (!serverForm.name || !serverForm.port) { showToast('请填写完整信息', 'error'); return; }
  
  document.getElementById('serverModal').style.display = 'none';
  
  // 显示添加动画
  showProcessing('正在添加服务器', '⚙️', () => {
    state.servers.push({
      name: serverForm.name,
      config: serverForm.config,
      region: serverForm.region,
      memory: serverForm.memory,
      port: serverForm.port,
      payMethod: serverForm.payMethod,
      createdAt: new Date().toLocaleString('zh-CN')
    });
    saveAll();
    showToast('服务器添加成功', 'success');
    renderServers();
  });
}

/* ===== 处理动画 ===== */
function showProcessing(text, icon, callback) {
  const overlay = document.getElementById('processingOverlay');
  document.getElementById('procText').textContent = text;
  document.getElementById('procIcon').textContent = icon || '⚙️';
  document.getElementById('procBar').style.width = '0';
  overlay.style.display = 'flex';
  
  let progress = 0;
  const bar = document.getElementById('procBar');
  const interval = setInterval(() => {
    progress += 4 + Math.random() * 6;
    if (progress >= 100) {
      progress = 100;
      bar.style.width = '100%';
      clearInterval(interval);
      setTimeout(() => {
        overlay.style.display = 'none';
        if (callback) callback();
      }, 500);
    } else {
      bar.style.width = progress + '%';
    }
  }, 200);
}

/* ===== 我的域名 ===== */
function renderDomains() {
  const area = document.getElementById('contentArea');
  
  let domainCards = state.domains.map(d => `
    <div class="domain-card">
      <div class="domain-type ${d.type === 'bound' ? 'bound' : 'custom'}">
        ${d.type === 'bound' ? '绑定域名' : '自定义域名'}
      </div>
      <div class="domain-url">${escapeHtml(d.url)}</div>
      <div class="domain-status">${escapeHtml(d.status || '已解析')}</div>
    </div>
  `).join('');
  
  if (state.domains.length === 0) {
    domainCards = `
      <div class="empty-state">
        <div class="empty-icon">🌐</div>
        <div class="empty-text">暂无域名</div>
        <div class="empty-hint">点击右上角添加您的域名</div>
      </div>
    `;
  }
  
  area.innerHTML = `
    <div class="page-title">我的域名</div>
    <div class="server-header">
      <span style="color:var(--text-dim);font-size:14px;">共 ${state.domains.length} 个域名</span>
      <button class="add-btn" onclick="openAddDomain()" title="添加域名">+</button>
    </div>
    ${domainCards}
  `;
}

function openAddDomain() {
  const area = document.getElementById('contentArea');
  // 用弹窗形式
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'domainAddModal';
  modal.style.display = 'flex';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">添加域名</div>
      <div class="modal-desc">只能添加您自己的域名，请输入域名地址。</div>
      <input type="text" class="modal-input" id="domainInput" placeholder="例如：mydomain.com">
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('domainAddModal').remove()">取消</button>
        <button class="btn btn-primary" onclick="submitDomain()">确认添加</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  setTimeout(() => document.getElementById('domainInput').focus(), 100);
}

function submitDomain() {
  const val = document.getElementById('domainInput').value.trim();
  if (!val) { showToast('请输入域名', 'error'); return; }
  
  state.domains.push({ url: val, type: 'custom', status: '已解析' });
  saveAll();
  document.getElementById('domainAddModal').remove();
  showToast('域名添加成功', 'success');
  renderDomains();
}

let rechargeData = { method: null, account: '', amount: 0 };

function openRecharge() {
  rechargeData = { method: null, account: '', amount: 0 };
  document.getElementById('rechargeContent').innerHTML = `
    <div class="select-label">充值金额</div>
    <div class="config-row" id="amountList">
      ${[10, 50, 100, 500].map(a => `
        <div class="select-item" onclick="selectAmount(${a}, this)" style="flex-direction:column;">
          <span class="ci-title">¥${a}</span>
        </div>
      `).join('')}
    </div>
    <div class="select-label">选择支付方式</div>
    <div class="pay-options">
      <div class="pay-option" onclick="selectRechargePay('wechat', this)">
        <div class="icon">💬</div>
        <div class="name">微信支付</div>
      </div>
      <div class="pay-option" onclick="selectRechargePay('alipay', this)">
        <div class="icon">💰</div>
        <div class="name">支付宝</div>
      </div>
    </div>
    <div id="rechargeAccountArea" style="display:none;">
      <div class="select-label" id="rechargeAccountLabel">请填入支付账号</div>
      <input type="text" class="modal-input" id="rechargeAccountInput" placeholder="输入您的支付账号">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('rechargeModal').style.display='none'">取消</button>
      <button class="btn btn-primary" onclick="confirmRecharge()" id="rechargeBtn" disabled style="opacity:0.5;">确认支付</button>
    </div>
  `;
  document.getElementById('rechargeModal').style.display = 'flex';
}

function selectAmount(a, el) {
  rechargeData.amount = a;
  document.querySelectorAll('#amountList .select-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  checkRecharge();
}

function selectRechargePay(method, el) {
  rechargeData.method = method;
  document.querySelectorAll('.pay-option').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('rechargeAccountArea').style.display = 'block';
  const payName = method === 'wechat' ? '微信' : '支付宝';
  document.getElementById('rechargeAccountLabel').textContent = '请填入' + payName + '账号';
  document.getElementById('rechargeAccountInput').placeholder = '输入您的' + payName + '账号';
  document.getElementById('rechargeAccountInput').oninput = function() {
    rechargeData.account = this.value.trim();
    checkRecharge();
  };
  checkRecharge();
}

function checkRecharge() {
  const ok = rechargeData.amount > 0 && rechargeData.method && rechargeData.account;
  const btn = document.getElementById('rechargeBtn');
  if (btn) { btn.disabled = !ok; btn.style.opacity = ok ? '1' : '0.5'; }
}

function confirmRecharge() {
  if (!rechargeData.amount || !rechargeData.method || !rechargeData.account) return;
  
  document.getElementById('rechargeModal').style.display = 'none';
  
  showProcessing('正在处理支付', '💳', () => {
    state.balance += rechargeData.amount;
    state.transactions.unshift({
      title: '账户充值',
      type: 'income',
      amount: rechargeData.amount,
      time: new Date().toLocaleString('zh-CN')
    });
    saveAll();
    document.getElementById('topBalance').textContent = '¥' + state.balance.toFixed(2);
    showToast('充值成功 ¥' + rechargeData.amount.toFixed(2), 'success');
    renderWallet();
  });
}

/* ===== 数据库管理 ===== */
const dbTypes = [
  { id: 'mysql', name: 'MySQL', desc: '关系型数据库', color: '#00758f', logo: '🐬' },
  { id: 'postgres', name: 'PostgreSQL', desc: '高级关系型', color: '#336791', logo: '🐘' },
  { id: 'mongodb', name: 'MongoDB', desc: '文档型数据库', color: '#47a248', logo: '🍃' },
  { id: 'redis', name: 'Redis', desc: '内存缓存', color: '#dc382d', logo: '⚡' },
  { id: 'sqlite', name: 'SQLite', desc: '轻量级数据库', color: '#003b57', logo: '📦' },
  { id: 'mariadb', name: 'MariaDB', desc: 'MySQL分支', color: '#003545', logo: '🦭' }
];

let dbForm = { type: null, memory: null, connectedServer: null };

function renderDatabase() {
  const area = document.getElementById('contentArea');
  
  let dbCards = dbTypes.map(db => `
    <div class="db-card" onclick="selectDbType('${db.id}', this)" data-dbid="${db.id}">

  `).join('');
  
  let ownedDbs = state.databases.length > 0 ? `
    <div class="section-divider">已购买的数据库</div>
    ${state.databases.map((d, i) => `
      <div class="server-card">
        <div class="card-header">
          <div class="server-name">${escapeHtml(d.typeName)} 实例</div>
          <div class="server-status">运行中</div>
        </div>
        <div class="server-info-grid">
          <div class="info-item">

            <span class="value">${escapeHtml(d.typeName)}</span>
          </div>
          <div class="info-item">
            <span class="label">内存</span>

          </div>

            <span class="label">连接服务器</span>
            <span class="value">${escapeHtml(d.connectedServer || '未连接')}</span>
          </div>
          <div class="info-item">
            <span class="label">端口</span>
            <span class="value">${escapeHtml(d.port || '—')}</span>

          <button class="btn btn-primary" onclick="openTerminal(${i})" style="font-size:13px;padding:8px 20px;">打开终端</button>
        </div>
      </div>
    `).join('')}
  ` : '';

    <div class="terminal-container" id="terminalContainer" style="display:none;margin-top:20px;">
      <div class="terminal-header">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <span class="term-title" id="termTitle">数据库终端</span>

function selectDbType(id, el) {

  let serverOptions = state.servers.length > 0 
    ? state.servers.map((s, i) => `
        <div class="select-item" onclick="selectDbServer(${i}, this)">
          <div>
            <div style="font-weight:bold;color:var(--text);">${escapeHtml(s.name)}</div>
            <div style="font-size:12px;color:var(--text-dim);">端口: ${escapeHtml(s.port)} · ${escapeHtml(s.region)}</div>
          </div>
          <span class="check">✓</span>
        </div>
      `).join('')
    : '<div style="color:var(--text-dim);text-align:center;padding:20px;">请先添加服务器</div>';
  
  document.getElementById('dbModalContent').innerHTML = `
    <div class="modal-desc">您选择了 <b style="color:var(--pink);">${db.name}</b> ${db.logo}</div>

      ${['1GB','2GB','4GB','8GB'].map(m => `
        <div class="select-item" onclick="selectDbMemory('${m}', this)" style="flex-direction:column;">
          <span class="ci-title">${m}</span>
        </div>
      `).join('')}
    </div>
    <div class="select-label">连接服务器（数据库将连接到所选服务器的端口）</div>
    <div class="select-group" id="dbServerList">
      ${serverOptions}
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="document.getElementById('dbModal').style.display='none'">取消</button>
      <button class="btn btn-primary" onclick="confirmBuyDb()" id="buyDbBtn" disabled style="opacity:0.5;">确认购买</button>
    </div>
  `;
  document.getElementById('dbModal').style.display = 'flex';
}

function selectDbMemory(m, el) {
  dbForm.memory = m;
  document.querySelectorAll('#dbMemoryList .select-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  checkBuyDb();
}

function selectDbServer(i, el) {
  dbForm.connectedServer = i;
  document.querySelectorAll('#dbServerList .select-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  checkBuyDb();
}

function checkBuyDb() {
  const ok = dbForm.memory && dbForm.connectedServer !== null;
  const btn = document.getElementById('buyDbBtn');
  if (btn) { btn.disabled = !ok; btn.style.opacity = ok ? '1' : '0.5'; }
}

function confirmBuyDb() {
  if (dbForm.connectedServer === null || !dbForm.memory) return;
  
  const db = dbTypes.find(d => d.id === dbForm.type);
  const server = state.servers[dbForm.connectedServer];
  
  document.getElementById('dbModal').style.display = 'none';
  
  showProcessing('正在创建数据库', '🗄️', () => {
    state.databases.push({
      typeId: db.id,
      typeName: db.name,
      memory: dbForm.memory,
      connectedServer: server.name,
      port: server.port,
      createdAt: new Date().toLocaleString('zh-CN')
    });
    saveAll();
    showToast(db.name + ' 数据库创建成功', 'success');
    renderDatabase();
  });
}

/* ===== 终端 ===== */
function openTerminal(idx) {
  const db = state.databases[idx];
  const dbType = dbTypes.find(d => d.id === db.typeId);
  
  const container = document.getElementById('terminalContainer');
  const body = document.getElementById('terminalBody');
  document.getElementById('termTitle').textContent = `${dbType.name} 终端 - ${db.connectedServer}:${db.port}`;
  container.style.display = 'block';
  
  // 模拟终端输出
  const lines = [
    { text: `Connecting to ${dbType.name} server at ${db.connectedServer}:${db.port}...`, color: 'var(--text-dim)' },
    { text: `Welcome to ${dbType.name} monitor. Commands end with ; or \\g.`, color: '#00ff88' },
    { text: `Your ${dbType.name} connection id is ${Math.floor(Math.random()*9000+1000)}`, color: '#00ff88' },
    { text: `Server version: 8.0.35-${dbType.name} (Punk Cloud Edition)`, color: '#00ff88' },
    { text: `Memory allocated: ${db.memory}`, color: '#00ff88' },
    { text: '', color: '' },
    { text: `Type 'help;' or '\\h' for help. Type '\\c' to clear the current input statement.`, color: 'var(--text-dim)' },
  ];
  
  body.innerHTML = '';
  let lineIdx = 0;
  
  function typeNext() {
    if (lineIdx < lines.length) {
      const line = lines[lineIdx];
      const div = document.createElement('div');
      div.className = 'terminal-line';
      div.style.color = line.color;
      div.textContent = line.text || '\u00A0';
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
      lineIdx++;
      setTimeout(typeNext, 300);
    } else {
      // 添加命令行提示
      const promptLine = document.createElement('div');
      promptLine.className = 'terminal-line';
      promptLine.innerHTML = `<span class="terminal-prompt">${dbType.name}> </span><span class="terminal-cursor"></span>`;
      body.appendChild(promptLine);
      body.scrollTop = body.scrollHeight;
      
      // 模拟可输入命令
      promptLine.addEventListener('click', () => {
        const cmd = window.prompt('输入命令（模拟终端）');
        if (cmd) {
          const cmdLine = document.createElement('div');
          cmdLine.className = 'terminal-line';
          cmdLine.innerHTML = `<span class="terminal-prompt">${dbType.name}> </span>${escapeHtml(cmd)}`;
          body.insertBefore(cmdLine, promptLine);
          
          // 模拟响应
          const respLine = document.createElement('div');
          respLine.className = 'terminal-line';
          respLine.style.color = '#00ff88';
          
          if (cmd.toLowerCase().includes('show databases')) {
            respLine.textContent = '+--------------------+\n| Database           |\n+--------------------+\n| information_schema |\n| ' + dbType.name.toLowerCase() + '        |\n| test               |\n+--------------------+\n3 rows in set (0.00 sec)';
            respLine.style.whiteSpace = 'pre';
          } else if (cmd.toLowerCase().includes('select')) {
            respLine.textContent = 'Empty set (0.00 sec)';
          } else if (cmd.toLowerCase().includes('create')) {
            respLine.textContent = 'Query OK, 1 row affected (0.02 sec)';
          } else {
            respLine.textContent = 'Query OK (0.01 sec)';
          }
          body.insertBefore(respLine, promptLine);
          body.scrollTop = body.scrollHeight;
        }
      });
    }
  }
  typeNext();
  
  // 滚动到终端
  setTimeout(() => container.scrollIntoView({ behavior: 'smooth' }), 100);
}

/* ===== 工具 ===== */
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
