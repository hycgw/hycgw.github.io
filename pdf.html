<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF在线阅读器</title>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --primary: #4a90d9;
    --primary-dark: #3a7bc8;
    --primary-light: #e8f1fc;
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --border: #e1e8ed;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 28px rgba(0,0,0,0.15);
    --radius: 12px;
    --tag-bg: #ecf0f1;
    --danger: #e74c3c;
    --danger-light: #fdf2f2;
}

body {
    font-family: "PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
}

/* ==================== 顶部导航 ==================== */
.top-bar {
    background: linear-gradient(135deg, #3a7bc8 0%, #4a90d9 100%);
    color: white; box-shadow: 0 2px 16px rgba(58,123,200,0.3);
    position: sticky; top: 0; z-index: 100;
}
.top-bar-inner {
    max-width: 1200px; margin: 0 auto; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
.top-actions { display: flex; gap: 10px; align-items: center; }
.btn-upload {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.2); color: white;
    border: 2px solid rgba(255,255,255,0.4);
    padding: 10px 20px; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.25s ease; backdrop-filter: blur(8px);
}
.btn-upload:hover { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.7); transform: translateY(-1px); }
.btn-upload:active { transform: translateY(0); }
.btn-clear {
    display: flex; align-items: center; gap: 6px;
    background: rgba(231,76,60,0.3); color: white;
    border: 2px solid rgba(231,76,60,0.5);
    padding: 10px 16px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.25s ease;
}
.btn-clear:hover { background: rgba(231,76,60,0.5); border-color: rgba(231,76,60,0.8); }

/* ==================== 主内容区 ==================== */
.main-content { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }
.book-section { margin-bottom: 40px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.section-title { display: flex; align-items: center; gap: 12px; font-size: 22px; font-weight: 700; color: var(--text); }
.title-bar { display: inline-block; width: 4px; height: 22px; background: var(--primary); border-radius: 2px; }
.record-count { font-size: 14px; color: var(--text-light); background: var(--tag-bg); padding: 3px 12px; border-radius: 20px; }
.section-desc { color: var(--text-light); font-size: 14px; margin-bottom: 20px; padding-left: 16px; }

/* ==================== 书籍网格 ==================== */
.book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

.book-card {
    background: var(--card-bg); border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); transition: all 0.3s ease;
    border: 1px solid var(--border);
    display: flex; flex-direction: column; cursor: pointer; position: relative;
}
.book-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-4px); }

.book-cover {
    width: 100%; height: 220px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
}
.cover-placeholder { color: rgba(255,255,255,0.8); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; font-size: 13px; }
.cover-placeholder svg { opacity: 0.6; }
.book-cover img { width: 100%; height: 100%; object-fit: cover; }

.btn-delete {
    position: absolute; top: 8px; right: 8px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(231,76,60,0.85); color: white; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; z-index: 5; opacity: 0;
}
.book-card:hover .btn-delete { opacity: 1; }
.btn-delete:hover { background: rgba(231,76,60,1); transform: scale(1.1); }

.book-info { padding: 18px; flex: 1; display: flex; flex-direction: column; }
.book-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; color: var(--text); word-break: break-all; }
.book-subtitle { font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
.book-time { font-size: 12px; color: var(--text-light); margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }
.book-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.tag { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: var(--tag-bg); color: var(--text-light); font-weight: 500; }

.book-actions { margin-top: auto; display: flex; gap: 10px; }
.btn-download {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s ease; border: 1px solid rgba(74,144,217,0.3); text-decoration: none;
    background: var(--primary-light); color: var(--primary);
}
.btn-download:hover { background: #d6e6fa; }

/* ==================== 空状态 ==================== */
.empty-hint {
    text-align: center; padding: 60px 20px 40px; color: var(--text-light);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.empty-icon { margin-bottom: 12px; }
.empty-icon svg { opacity: 0.25; }
.empty-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.empty-desc { font-size: 15px; color: var(--text-light); max-width: 360px; line-height: 1.6; }
.empty-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary); color: white; border: none;
    padding: 12px 28px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: all 0.25s ease; margin: 12px 0 24px;
}
.empty-btn:hover { background: var(--primary-dark); box-shadow: 0 4px 16px rgba(74,144,217,0.4); transform: translateY(-1px); }
.empty-dropzone {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 32px; border: 2px dashed var(--border); border-radius: 12px;
    color: var(--text-light); font-size: 14px; transition: all 0.25s ease;
}
.empty-dropzone svg { opacity: 0.5; }
.empty-dropzone.drag-active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }

/* ==================== Toast 提示 ==================== */
.toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #2c3e50; color: white; padding: 12px 24px; border-radius: 8px;
    font-size: 15px; font-weight: 500; z-index: 2000; opacity: 0;
    transition: all 0.35s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }

/* ==================== PDF查看器弹窗 ==================== */
.viewer-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.92); z-index: 1000; display: none; flex-direction: column;
}
.viewer-overlay.active { display: flex; }
.viewer-container { width: 100%; height: 100%; display: flex; flex-direction: column; }

.viewer-header {
    background: #1a1a2e; color: white; padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.viewer-title { font-size: 16px; font-weight: 600; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.viewer-controls { display: flex; align-items: center; gap: 6px; }
.ctrl-btn {
    background: rgba(255,255,255,0.1); border: none; color: white;
    width: 38px; height: 38px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.25); }
.ctrl-btn:active { transform: scale(0.92); }
.close-btn:hover { background: rgba(231,76,60,0.7); }
.ctrl-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.15); margin: 0 6px; }
.page-info { font-size: 14px; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 4px; min-width: 80px; justify-content: center; }
#pageInput { width: 42px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; text-align: center; border-radius: 4px; padding: 3px 4px; font-size: 14px; }
#pageInput::-webkit-inner-spin-button { -webkit-appearance: none; }
.zoom-info { font-size: 13px; color: rgba(255,255,255,0.7); min-width: 45px; text-align: center; }

/* ==================== 缓存加载动画 ==================== */
.cache-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; display: flex; flex-direction: column; align-items: center; }
.cache-loading.hidden { display: none; }
.cache-animation { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.cache-circle { position: relative; }
.cache-progress-circle { animation: cache-spin 1.5s linear infinite; transform-origin: 50% 50%; }
@keyframes cache-spin { from { stroke-dashoffset: 251; } to { stroke-dashoffset: 0; } }
.cache-text { text-align: center; }
.cache-main-text { font-size: 22px; font-weight: 700; color: white; margin-bottom: 8px; }
.cache-sub-text { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 14px; }
.cache-dots { display: flex; justify-content: center; gap: 6px; }
.cache-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: dot-bounce 1.4s ease-in-out infinite; }
.cache-dots span:nth-child(2) { animation-delay: 0.2s; }
.cache-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

/* ==================== PDF渲染区 ==================== */
.viewer-body { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; background: #2c2c3e; }
.viewer-body.hidden { overflow: hidden; }
#pdfCanvas { box-shadow: 0 4px 20px rgba(0,0,0,0.4); border-radius: 4px; max-width: none; }

/* ==================== 响应式 ==================== */
@media (max-width: 768px) {
    .top-bar-inner { flex-direction: column; gap: 12px; padding: 14px 16px; }
    .logo { font-size: 17px; }
    .book-grid { grid-template-columns: 1fr; }
    .viewer-header { flex-wrap: wrap; gap: 8px; padding: 8px 12px; }
    .viewer-title { max-width: 100%; font-size: 14px; }
    .viewer-controls { flex-wrap: wrap; justify-content: center; }
    .main-content { padding: 20px 16px 60px; }
    .btn-delete { opacity: 1; }
}
</style>
</head>
<body>

<!-- ============ 顶部导航 ============ -->
<header class="top-bar">
    <div class="top-bar-inner">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z" stroke-linejoin="round"/>
                <path d="M8 7h8M8 11h6" stroke-linecap="round"/>
            </svg>
            <span>PDF在线阅读器</span>
        </div>
        <div class="top-actions">
            <button class="btn-clear" id="btnClearAll" style="display:none" onclick="clearAllRecords()">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                清空记录
            </button>
            <button class="btn-upload" onclick="document.getElementById('uploadInput').click()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                上传PDF
            </button>
            <input type="file" id="uploadInput" accept="application/pdf" style="display:none" multiple>
        </div>
    </div>
</header>

<!-- ============ 主内容区 ============ -->
<main class="main-content">

    <section class="book-section" id="uploadedSection" style="display:none">
        <div class="section-header">
            <h2 class="section-title">
                <span class="title-bar"></span>
                我的PDF
            </h2>
            <span class="record-count" id="recordCount">0 个文件</span>
        </div>
        <p class="section-desc">点击卡片即可在线查看，支持下载 · 记录已保存到本地</p>
        <div class="book-grid" id="uploadedBooks"></div>
    </section>

    <div class="empty-hint" id="emptyHint">
        <div class="empty-icon">
            <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linejoin="round"/>
                <path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <p class="empty-title">还没有PDF文件</p>
        <p class="empty-desc">点击右上角「上传PDF」按钮，选择PDF文件即可在线查看</p>
        <button class="empty-btn" onclick="document.getElementById('uploadInput').click()">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            立即上传
        </button>
        <div class="empty-dropzone" id="dropzone">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>也可以把PDF文件拖拽到这里</span>
        </div>
    </div>
</main>

<!-- ============ Toast 提示 ============ -->
<div class="toast" id="toast"></div>

<!-- ============ PDF查看器弹窗 ============ -->
<div class="viewer-overlay" id="viewerOverlay">
    <div class="viewer-container">
        <div class="viewer-header">
            <div class="viewer-title" id="viewerTitle">PDF阅读器</div>
            <div class="viewer-controls">
                <button class="ctrl-btn" onclick="prevPage()" title="上一页">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <span class="page-info">
                    <input type="number" id="pageInput" value="1" min="1" onchange="jumpToPage(this.value)"> / <span id="totalPages">--</span>
                </span>
                <button class="ctrl-btn" onclick="nextPage()" title="下一页">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="ctrl-divider"></div>
                <button class="ctrl-btn" onclick="zoomOut()" title="缩小">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M8 11h6M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
                </button>
                <span class="zoom-info" id="zoomInfo">100%</span>
                <button class="ctrl-btn" onclick="zoomIn()" title="放大">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M11 8v6M8 11h6M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
                </button>
                <button class="ctrl-btn" onclick="resetZoom()" title="重置缩放">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9M3 4v5h5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="ctrl-divider"></div>
                <button class="ctrl-btn close-btn" onclick="closeViewer()" title="关闭">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
                </button>
            </div>
        </div>

        <div class="cache-loading" id="cacheLoading">
            <div class="cache-animation">
                <div class="cache-circle">
                    <svg viewBox="0 0 100 100" width="80" height="80">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#4a90d9" stroke-width="6" stroke-linecap="round" stroke-dasharray="251" stroke-dashoffset="251" class="cache-progress-circle"/>
                    </svg>
                </div>
                <div class="cache-text">
                    <p class="cache-main-text">正在缓存</p>
                    <p class="cache-sub-text" id="cacheSubText">正在等待缓存，请稍候...</p>
                    <div class="cache-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>

        <div class="viewer-body" id="viewerBody">
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>
</div>

<script>
// ==================== IndexedDB 存储 ====================
const DB_NAME = 'PDFReaderDB';
const DB_VERSION = 1;
const STORE_NAME = 'pdfs';
let db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains(STORE_NAME)) {
                database.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = (e) => reject(e.target.error);
    });
}

function dbAdd(record) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.add(record);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

function dbGetAll() {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}

function dbDelete(id) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

function dbClearAll() {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const req = store.clear();
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
    });
}

// ==================== 全局状态 ====================
let currentPDF = null;
let currentPage = 1;
let totalPages = 0;
let scale = 1.3;
let renderTask = null;

// ==================== Toast 提示 ====================
function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(() => { toast.className = 'toast'; }, 2500);
}

// ==================== 格式化时间 ====================
function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    const m = (d.getMonth() + 1).toString().padStart(2, '0');
    const day = d.getDate().toString().padStart(2, '0');
    const h = d.getHours().toString().padStart(2, '0');
    const min = d.getMinutes().toString().padStart(2, '0');
    return m + '-' + day + ' ' + h + ':' + min;
}

function formatSize(bytes) {
    if (bytes > 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    return (bytes / 1024).toFixed(0) + ' KB';
}

// ==================== 打开PDF查看器 ====================
async function openPDF(src, title) {
    const overlay = document.getElementById('viewerOverlay');
    const cacheLoading = document.getElementById('cacheLoading');
    const viewerBody = document.getElementById('viewerBody');
    const viewerTitle = document.getElementById('viewerTitle');
    const subText = document.getElementById('cacheSubText');

    overlay.classList.add('active');
    viewerTitle.textContent = title || 'PDF阅读器';

    cacheLoading.classList.remove('hidden');
    viewerBody.classList.add('hidden');
    subText.style.color = '';
    subText.textContent = '正在等待缓存，请稍候...';

    currentPage = 1; totalPages = 0; scale = 1.3;
    document.getElementById('pageInput').value = 1;
    document.getElementById('totalPages').textContent = '--';
    document.getElementById('zoomInfo').textContent = '100%';

    try {
        currentPDF = await pdfjsLib.getDocument(src).promise;
        totalPages = currentPDF.numPages;
        document.getElementById('totalPages').textContent = totalPages;

        await new Promise(r => setTimeout(r, 1200));
        subText.textContent = '缓存完成，正在打开...';
        await new Promise(r => setTimeout(r, 400));

        cacheLoading.classList.add('hidden');
        viewerBody.classList.remove('hidden');
        await renderPage(currentPage);
    } catch (err) {
        subText.textContent = '加载失败，请重试';
        subText.style.color = '#e74c3c';
        setTimeout(() => { closeViewer(); subText.style.color = ''; }, 3000);
    }
}

// ==================== 渲染页面 ====================
async function renderPage(pageNum) {
    if (!currentPDF) return;
    if (renderTask) renderTask.cancel();

    const page = await currentPDF.getPage(pageNum);
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = page.getViewport({ scale: scale });
    canvas.width = viewport.width; canvas.height = viewport.height;

    const viewerBody = document.getElementById('viewerBody');
    const maxWidth = viewerBody.clientWidth - 40;
    if (viewport.width > maxWidth) {
        const fitScale = maxWidth / viewport.width * scale;
        const fitViewport = page.getViewport({ scale: fitScale });
        canvas.width = fitViewport.width; canvas.height = fitViewport.height;
        renderTask = page.render({ canvasContext: ctx, viewport: fitViewport });
    } else {
        renderTask = page.render({ canvasContext: ctx, viewport: viewport });
    }

    try { await renderTask.promise; }
    catch (err) { if (err.name !== 'RenderingCancelledException') console.error('渲染失败:', err); }
    document.getElementById('pageInput').value = pageNum;
}

// ==================== 翻页/缩放/关闭 ====================
function prevPage() { if (currentPage > 1) { currentPage--; renderPage(currentPage); } }
function nextPage() { if (currentPage < totalPages) { currentPage++; renderPage(currentPage); } }
function jumpToPage(page) { page = parseInt(page); if (isNaN(page)) page = 1; page = Math.max(1, Math.min(page, totalPages)); currentPage = page; renderPage(currentPage); }
function zoomIn() { scale = Math.min(4, scale + 0.2); document.getElementById('zoomInfo').textContent = Math.round(scale / 1.3 * 100) + '%'; renderPage(currentPage); }
function zoomOut() { scale = Math.max(0.5, scale - 0.2); document.getElementById('zoomInfo').textContent = Math.round(scale / 1.3 * 100) + '%'; renderPage(currentPage); }
function resetZoom() { scale = 1.3; document.getElementById('zoomInfo').textContent = '100%'; renderPage(currentPage); }
function closeViewer() {
    document.getElementById('viewerOverlay').classList.remove('active');
    if (renderTask) { renderTask.cancel(); renderTask = null; }
    if (currentPDF) { currentPDF.destroy(); currentPDF = null; }
}

document.addEventListener('keydown', (e) => {
    if (!document.getElementById('viewerOverlay').classList.contains('active')) return;
    if (e.key === 'ArrowLeft') prevPage();
    if (e.key === 'ArrowRight') nextPage();
    if (e.key === 'Escape') closeViewer();
    if (e.key === '+' || e.key === '=') zoomIn();
    if (e.key === '-') zoomOut();
});

// ==================== 渲染卡片 ====================
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function renderCard(record) {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.dataset.id = record.id;

    const url = URL.createObjectURL(record.blob);
    card.dataset.url = url;

    card.onclick = (e) => {
        if (e.target.closest('.btn-download') || e.target.closest('.btn-delete')) return;
        openPDF(url, record.name);
    };

    card.innerHTML = `
        <button class="btn-delete" onclick="deleteRecord(${record.id})" title="删除记录">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="book-cover" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">
            <div class="cover-placeholder">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z" stroke-linejoin="round"/><path d="M8 7h8M8 11h6" stroke-linecap="round"/></svg>
                <p>生成封面中...</p>
            </div>
        </div>
        <div class="book-info">
            <h3 class="book-title">${escapeHtml(record.name.replace(/\.pdf$/i, ''))}</h3>
            <p class="book-subtitle">${formatSize(record.size)}</p>
            <div class="book-time">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2" stroke-linecap="round"/></svg>
                ${formatTime(record.uploadTime)}
            </div>
            <div class="book-tags"><span class="tag">PDF文件</span></div>
            <div class="book-actions">
                <a class="btn-download" href="${url}" download="${escapeHtml(record.name)}" onclick="event.stopPropagation()">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    下载
                </a>
            </div>
        </div>`;

    return card;
}

async function loadCoverThumbnail(url, card) {
    try {
        const pdf = await pdfjsLib.getDocument(url).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 0.5 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = viewport.width; canvas.height = viewport.height;
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;
        const coverDiv = card.querySelector('.book-cover');
        coverDiv.style.background = 'none';
        coverDiv.innerHTML = `<img src="${canvas.toDataURL('image/jpeg', 0.85)}" alt="封面">`;
        pdf.destroy();
    } catch (err) {
        const p = card.querySelector('.cover-placeholder p');
        if (p) p.textContent = 'PDF文件';
    }
}

// ==================== 加载所有记录 ====================
async function loadAllRecords() {
    const records = await dbGetAll();
    const uploadedBooks = document.getElementById('uploadedBooks');
    const uploadedSection = document.getElementById('uploadedSection');
    const emptyHint = document.getElementById('emptyHint');
    const btnClearAll = document.getElementById('btnClearAll');
    const recordCount = document.getElementById('recordCount');

    uploadedBooks.innerHTML = '';

    if (records.length === 0) {
        uploadedSection.style.display = 'none';
        emptyHint.style.display = 'flex';
        btnClearAll.style.display = 'none';
        return;
    }

    uploadedSection.style.display = 'block';
    emptyHint.style.display = 'none';
    btnClearAll.style.display = 'flex';
    recordCount.textContent = records.length + ' 个文件';

    // 按上传时间倒序
    records.sort((a, b) => b.uploadTime - a.uploadTime);

    for (const record of records) {
        const card = renderCard(record);
        uploadedBooks.appendChild(card);
        loadCoverThumbnail(card.dataset.url, card);
    }
}

// ==================== 上传处理（保存到IndexedDB） ====================
async function handleFiles(files) {
    if (!files || files.length === 0) return;

    let success = 0;
    for (const file of files) {
        if (file.type !== 'application/pdf') continue;
        try {
            await dbAdd({
                name: file.name,
                size: file.size,
                blob: file,
                uploadTime: Date.now()
            });
            success++;
        } catch (err) {
            console.error('保存失败:', err);
        }
    }

    if (success > 0) {
        showToast('已保存 ' + success + ' 个文件', 'success');
        await loadAllRecords();
    }
}

// ==================== 删除记录 ====================
async function deleteRecord(id) {
    event.stopPropagation();
    try {
        await dbDelete(id);
        showToast('已删除', 'success');
        await loadAllRecords();
    } catch (err) {
        showToast('删除失败', 'error');
    }
}

// ==================== 清空所有记录 ====================
async function clearAllRecords() {
    if (!confirm('确定要清空所有PDF记录吗？此操作不可恢复。')) return;
    try {
        await dbClearAll();
        showToast('已清空所有记录', 'success');
        await loadAllRecords();
    } catch (err) {
        showToast('清空失败', 'error');
    }
}

// ==================== 事件绑定 ====================
document.getElementById('uploadInput').addEventListener('change', (e) => { handleFiles(e.target.files); e.target.value = ''; });

const dropzone = document.getElementById('dropzone');
const emptyHint = document.getElementById('emptyHint');
['dragenter','dragover'].forEach(evt => {
    emptyHint.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropzone.classList.add('drag-active'); });
});
['dragleave','drop'].forEach(evt => {
    emptyHint.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropzone.classList.remove('drag-active'); });
});
emptyHint.addEventListener('drop', (e) => { handleFiles(e.dataTransfer.files); });
['dragover','drop'].forEach(evt => { document.addEventListener(evt, (e) => e.preventDefault()); });

// ==================== 初始化 ====================
(async () => {
    try {
        await openDB();
        await loadAllRecords();
    } catch (err) {
        console.error('数据库初始化失败:', err);
        showToast('存储初始化失败，记录功能不可用', 'error');
    }
})();
</script>
